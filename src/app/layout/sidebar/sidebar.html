<div class="sidebar">

    <div class="logo">
        <h2>LMS</h2>
    </div>

    <ul class="menu">

        <!-- Dashboard -->
        <li routerLink="/dashboard" routerLinkActive="active">
            <i class="fa-solid fa-chart-line"></i>
            <span>Dashboard</span>
        </li>

        <!-- Logistics Admin -->
        <ng-container *ngIf="roleName === 'Logistics Admin'">

            <li routerLink="/master-management" routerLinkActive="active">
                <i class="fa-solid fa-building"></i>
                <span>Organization</span>
            </li>

            <li routerLink="/administration" routerLinkActive="active">
                <i class="fa-solid fa-user-shield"></i>
                <span>Administration</span>
            </li>

            <li routerLink="/operations" routerLinkActive="active">
                <i class="fa-solid fa-truck-fast"></i>
                <span>Operations</span>
            </li>

            <li routerLink="/track-orders" routerLinkActive="active">
                <i class="fa-solid fa-location-dot"></i>
                <span>Track Orders</span>
            </li>

            <li>
                <a routerLink="/driver-console">
                    <i class="fa-solid fa-truck"></i>
                    <span>Driver Console</span>
                </a>
            </li>

            <li>
                <a routerLink="/d-report">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Driver Report</span>
                </a>
            </li>

            <li>
                <a routerLink="/m-report">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Manager Report</span>
                </a>
            </li>

        </ng-container>

        <!-- Logistics Manager -->
        <ng-container *ngIf="roleName === 'Logistics Manager'">

            <li routerLink="/operations" routerLinkActive="active">
                <i class="fa-solid fa-truck-fast"></i>
                <span>Operations</span>
            </li>

            <li routerLink="/track-orders" routerLinkActive="active">
                <i class="fa-solid fa-location-dot"></i>
                <span>Track Orders</span>
            </li>


            <li>
                <a routerLink="/m-report">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Manager Report</span>
                </a>
            </li>










        </ng-container>

        <!-- Delivery Executive -->
        <ng-container *ngIf="roleName === 'Delivery Executive'">

            <li>
                <a routerLink="/driver-console">
                    <i class="fa-solid fa-truck"></i>
                    <span>Driver Console</span>
                </a>
            </li>

            <li>
                <a routerLink="/d-report">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Driver Report</span>
                </a>
            </li>

        </ng-container>

    </ul>

</div>
