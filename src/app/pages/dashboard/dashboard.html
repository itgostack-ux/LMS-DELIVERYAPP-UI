<div class="dash">

    <!-- ===== Header: role + user + refresh ===== -->
    <div class="dash-header">

        <div>
            <h3>Logistics Dashboard</h3>
            <div class="dash-sub">
                <span class="role-chip" *ngIf="roleName">{{roleName}}</span>
                <span class="user-chip" *ngIf="userName">
                    <i class="fa-solid fa-user"></i> {{userName}}
                </span>
                <span class="date-chip">{{today | date:'EEEE, dd MMM yyyy'}}</span>
            </div>
        </div>

        <button class="btn-refresh" (click)="refresh()" [disabled]="loading">
            <i class="fa-solid fa-rotate"></i>
            Refresh
        </button>

    </div>

    <div *ngIf="loading" class="dash-loading">
        <span class="spinner"></span> Loading dashboard...
    </div>

    <div *ngIf="errorMessage" class="dash-error">
        <i class="fa-solid fa-triangle-exclamation"></i> {{errorMessage}}
    </div>

    <ng-container *ngIf="!loading && !errorMessage">

        <!-- ===== KPI tiles (role based) ===== -->
        <div class="stat-grid">

            <div class="stat-card" *ngFor="let card of statCards"
                [class.clickable]="!!card.route"
                [style.--accent]="card.color"
                (click)="goTo(card.route)">

                <div class="stat-icon">
                    <i [class]="card.icon"></i>
                </div>

                <div class="stat-info">
                    <h5>{{card.label}}</h5>
                    <h2>{{card.value}}</h2>
                </div>

                <i class="fa-solid fa-chevron-right stat-go" *ngIf="card.route"></i>

            </div>

        </div>

        <!-- ===== Lifecycle status breakdown ===== -->
        <div class="panel" *ngIf="statusCounts.length > 0">

            <div class="panel-title">
                <i class="fa-solid fa-diagram-project"></i>
                Order Status Overview
            </div>

            <div class="status-strip">

                <div class="status-item" *ngFor="let s of statusCounts">
                    <span class="dot" [style.background]="s.color"></span>
                    <span class="name">{{s.name}}</span>
                    <span class="count" [style.color]="s.color">{{s.count}}</span>
                </div>

            </div>

        </div>

   

    </ng-container>

</div>
