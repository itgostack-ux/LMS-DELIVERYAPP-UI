<div class="dash">

    <!-- ===== Header: role + user + refresh ===== -->
    <div class="dash-header">

        <div>
            <h3>Logistics Dashboard</h3>
            <div class="dash-sub">
                <span class="role-chip" *ngIf="roleName">{{roleName}}</span>
                <span class="user-chip" *ngIf="userName">
                    <i class="fa-solid fa-user"></i> {{userName}}
                </span>
                <span class="date-chip">{{today | date:'EEEE, dd MMM yyyy'}}</span>
            </div>
        </div>

        <button class="btn-refresh" (click)="refresh()" [disabled]="loading">
            <i class="fa-solid fa-rotate"></i>
            Refresh
        </button>

    </div>

    <div *ngIf="loading" class="dash-loading">
        <span class="spinner"></span> Loading dashboard...
    </div>

    <div *ngIf="errorMessage" class="dash-error">
        <i class="fa-solid fa-triangle-exclamation"></i> {{errorMessage}}
    </div>

    <ng-container *ngIf="!loading && !errorMessage">

        <!-- ===== Filters: Company + Location Type ===== -->
        <!-- ===== Filters: Company + Location + Location Type ===== -->
        <div class="dash-filters" *ngIf="companies.length > 0 || locations.length > 0 || locationTypes.length > 0">

            <div class="filter-field" *ngIf="companies.length > 0">
                <label>Company</label>
                <select [(ngModel)]="selectedCompanyId" (change)="applyFilters()">
                    <option [ngValue]="0">All Companies</option>
                    <option *ngFor="let c of companies" [ngValue]="c.id">{{ c.name }}</option>
                </select>
            </div>

            <div class="filter-field" *ngIf="locations.length > 0">
                <label>Location</label>
                <select [(ngModel)]="selectedLocationId" (change)="applyFilters()">
                    <option [ngValue]="0">All Locations</option>
                    <option *ngFor="let l of locations" [ngValue]="l.id">{{ l.name }}</option>
                </select>
            </div>

            <div class="filter-field" *ngIf="locationTypes.length > 0">
                <label>Location Type</label>
                <select [(ngModel)]="selectedLocationTypeId" (change)="applyFilters()">
                    <option [ngValue]="0">All Types</option>
                    <option *ngFor="let t of locationTypes" [ngValue]="t.id">{{ t.name }}</option>
                </select>
            </div>

        </div>
        <!-- ===== KPI tiles: one card per lifecycle status (all roles) ===== -->
        <div class="stat-grid">

            <div class="stat-card" *ngFor="let card of statCards" [class.clickable]="!!card.route"
                [style.--accent]="card.color" (click)="goTo(card.route)">

                <div class="stat-icon">
                    <i [class]="card.icon"></i>
                </div>

                <div class="stat-info">
                    <h5>{{card.label}}</h5>
                    <h2>{{card.value}}</h2>
                </div>

                <i class="fa-solid fa-chevron-right stat-go" *ngIf="card.route"></i>

            </div>

        </div>

    </ng-container>

</div>
