<header>

    <div class="left">
        <h2>Logistics Management System</h2>
    </div>

    <div class="center">
        <input
            type="text"
            placeholder="Search Transfer Orders, Drivers, Vehicles...">
    </div>

    <div class="right">

        <div class="user-profile">

            <div class="user-details">

                <div class="user-name">
                    {{ userName }}
                </div>


                

            </div>

        </div>

        <button class="logout-btn" (click)="logout()">
              <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </button>

    </div>

</header>
