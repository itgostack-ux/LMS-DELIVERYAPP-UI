<div class="login-container">

    <div class="login-card">

        <h2>LMS</h2>

        <p>Login using OTP</p>

        <div class="error" *ngIf="errorMessage">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <line x1="12" y1="8" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="16" r="1" fill="currentColor"/>
            </svg>
            <span>{{errorMessage}}</span>
        </div>

        <input
            type="email"
            placeholder="Email"
            autocomplete="email"
            [(ngModel)]="email"
            [disabled]="showOtp"
            (keyup.enter)="!showOtp && sendOtp()">

        <input
            *ngIf="showOtp"
            type="text"
            placeholder="Enter OTP"
            inputmode="numeric"
            autocomplete="one-time-code"
            [(ngModel)]="otp"
            (keyup.enter)="login()">

        <button *ngIf="!showOtp" (click)="sendOtp()" [disabled]="loading">
            {{loading ? 'Sending...' : 'Get OTP'}}
        </button>

        <button *ngIf="showOtp" (click)="login()" [disabled]="loading">
            {{loading ? 'Please wait...' : 'Login'}}
        </button>

    </div>

</div>
